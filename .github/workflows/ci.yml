name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.25'
  GOLANGCI_LINT_VERSION: 'v2.6.1'

# Least-privilege default token scope for all jobs. Every job here only checks
# out code and runs build/test/lint/vet, so read-only contents is sufficient.
permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            coverage: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Install aarch64 binutils (FP16 .8H encoding cross-check)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Run tests
        env:
          # Require the aarch64 objdump FP16 (.8H) cross-check on Linux, where
          # binutils-aarch64-linux-gnu is installed above. macOS and Windows
          # lack it and skip that cross-check cleanly.
          SIMD_REQUIRE_OBJDUMP: ${{ runner.os == 'Linux' && '1' || '' }}
        run: go test -v -race ./...

      - name: Run tests with coverage
        if: matrix.coverage
        env:
          SIMD_REQUIRE_OBJDUMP: ${{ runner.os == 'Linux' && '1' || '' }}
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  vet:
    name: Vet
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Vet every supported arch, not just the host. go vet's asmdecl
        # analyzer only checks the target arch's assembly, so an amd64-only
        # vet silently skips the arm64 .s files. Cross-arch vet here is what
        # catches frame-size / FP-offset mismatches in the NEON kernels.
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run go vet
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go vet ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

  cross-isa:
    # Run the amd64 test suite under qemu on CPU models that lack AVX (and, for
    # Conroe, SSE4.1) so the SSE2/SSE4.x fallback dispatch paths are actually
    # exercised. Every CI/dev host has AVX, so without this leg the fallback
    # kernels are never run: a fallback that issues an unsupported instruction
    # (SIGILL) or diverges from the SIMD kernel ships undetected. qemu-x86_64
    # v7+ enforces the -cpu feature set, raising #UD for out-of-baseline ops.
    name: Cross-ISA (no-AVX fallbacks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install qemu-user
        run: sudo apt-get update && sudo apt-get install -y qemu-user

      - name: Run amd64 tests under no-AVX CPU models
        run: |
          set -uo pipefail
          # Conroe: SSSE3, no SSE4.1, no AVX (catches the c128 BLENDPD SIGILL).
          # qemu64 stripped to SSE2: the amd64 baseline (catches SSE3+ ops like
          # MOVDDUP and any non-SSE2 instruction in an SSE2-gated kernel).
          models=("Conroe" "qemu64,-pni,-ssse3,-sse4.1,-sse4.2,-avx,-avx2")
          fail=0
          for pkg in $(go list ./...); do
            # Skip packages with no test files; a compile failure in a real test
            # package must fail the job, not be silently swallowed.
            read -r ntest nxtest <<<"$(go list -f '{{len .TestGoFiles}} {{len .XTestGoFiles}}' "$pkg")"
            if [ "$ntest" -eq 0 ] && [ "$nxtest" -eq 0 ]; then continue; fi
            bin="/tmp/$(echo "$pkg" | tr '/.' '__').test"
            if ! CGO_ENABLED=0 go test -c -o "$bin" "$pkg"; then
              echo "::error::failed to compile tests for $pkg"
              fail=1
              continue
            fi
            for m in "${models[@]}"; do
              echo "::group::$pkg @ qemu -cpu $m"
              if qemu-x86_64 -cpu "$m" "$bin" -test.v; then
                echo "ok"
              else
                echo "::error::$pkg failed under qemu -cpu $m"
                fail=1
              fi
              echo "::endgroup::"
            done
            rm -f "$bin"
          done
          exit "$fail"
